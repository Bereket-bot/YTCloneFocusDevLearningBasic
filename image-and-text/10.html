<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        .rbo{
            font-family: Roboto Condensed;
            font-size: 24px;
            font-weight: 700;
            color: #07090c;
        }
        .form-control{
            display: block;
            width: 250px;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #495057;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
        .btn-primary{
            margin-right: 5px;
            color: #fff;
            background-color: #07090c;
            
        }
        .btn{
            margin-top: 10px;
            display: inline-block;
            font-weight: 400;
            text-align: center;
            white-space: nowrap;
            vertical-align: middle;
            user-select: none;
            border: 1px solid transparent;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            transition: color .15s ease-in-out,background-color .15s ease-in-out,border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
    </style>
    
    <title>Image and Text</title>
</head>
<body>
<p class="rbo">Request a ride now</p>
<input class="form-control" placeholder="Enter pickup location">
<input class="form-control" placeholder="Enter destination">
<button class="btn btn-primary">Request  now </button>
<button class="btn btn-secondary"> Schedule for later </button>
</body>
</html>
